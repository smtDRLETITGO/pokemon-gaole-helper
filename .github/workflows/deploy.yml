name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main   # 每次 push 到 main 分支時觸發自動部署

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # 1. 取出程式碼
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 設定 Node.js 環境
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. 安裝相依套件
      - name: Install dependencies
        run: npm ci

      # 4. 打包 (Vite build，自動帶入 base=/pokemon-gaole-helper/)
      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      # 5. 設定 GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # 6. 上傳打包結果
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      # 7. 部署到 GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
